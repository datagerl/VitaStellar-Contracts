# Minimal CI for VitaStellar-Contracts
# Verifies wasm32 builds, tests pass, code is formatted and coverage is reported

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build all contracts for wasm32
        run: |
          for contract in contracts/*/; do
            if [ -d "$contract" ] && [ -f "${contract}Cargo.toml" ]; then
              echo "Building: $(basename "$contract")"
              (cd "$contract" && cargo build --target wasm32-unknown-unknown --release) || exit 1
            fi
          done

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run tests
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --out Xml --timeout 600

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cobertura.xml
          fail_ci_if_error: false

  loc-check:
    name: LOC Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate threat-model LOC manifest
        run: |
          chmod +x scripts/loc_report.sh
          ./scripts/loc_report.sh --check

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  error_codes:
    name: Error Codes Reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Regenerate error codes reference
        run: python3 scripts/generate_error_codes.py --write

      - name: Check if docs/ERROR_CODES.md is up to date
        run: |
          if git diff --quiet docs/ERROR_CODES.md; then
            echo "✓ docs/ERROR_CODES.md is in sync with contract source"
          else
            echo "✗ docs/ERROR_CODES.md is out of sync"
            echo "Run: python3 scripts/generate_error_codes.py --write"
            git diff docs/ERROR_CODES.md
            exit 1
          fi
